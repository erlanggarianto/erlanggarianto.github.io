<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#080c14"/>
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#2e5bff" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Cyan glow behind middle bar -->
  <rect x="6" y="13.5" width="15" height="5" rx="2" fill="#00d4ff" opacity="0.12"/>
  <!-- E — vertical bar -->
  <rect x="7" y="6" width="3" height="20" rx="1" fill="#f0f4ff"/>
  <!-- E — top bar -->
  <rect x="7" y="6" width="17" height="3" rx="1" fill="#f0f4ff"/>
  <!-- E — middle bar (cyan accent — matches site gradient) -->
  <rect x="7" y="14.5" width="13" height="3" rx="1" fill="#00d4ff"/>
  <!-- E — bottom bar -->
  <rect x="7" y="23" width="17" height="3" rx="1" fill="#f0f4ff"/>
  <!-- Cyan dot (matches nav-logo dot) -->
  <circle cx="25" cy="8" r="2.5" fill="#00d4ff"/>
</svg>
